<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Car icon -->
  <g transform="translate(2, 8)">
    <!-- Shadow -->
    <ellipse cx="20" cy="42" rx="16" ry="3" fill="#000" opacity="0.08"/>
    <!-- Car body -->
    <rect x="0" y="20" width="42" height="16" rx="5" fill="#0f172a"/>
    <!-- Windshield -->
    <path d="M11 20 L14 8 L28 8 L31 20Z" fill="#0f172a"/>
    <!-- Side windows -->
    <rect x="16" y="10" width="10" height="8" rx="2" fill="#1e293b"/>
    <rect x="12" y="12" width="3" height="5" rx="1" fill="#1e293b"/>
    <rect x="27" y="12" width="3" height="5" rx="1" fill="#1e293b"/>
    <!-- Roof rack highlight -->
    <rect x="18" y="5" width="6" height="4" rx="1.5" fill="#22c55e"/>
    <!-- Wheels -->
    <circle cx="10" cy="38" r="9" fill="#0f172a"/>
    <circle cx="10" cy="38" r="5" fill="#22c55e"/>
    <circle cx="10" cy="38" r="2.5" fill="#0f172a"/>
    <circle cx="32" cy="38" r="9" fill="#0f172a"/>
    <circle cx="32" cy="38" r="5" fill="#22c55e"/>
    <circle cx="32" cy="38" r="2.5" fill="#0f172a"/>
    <!-- Detail line -->
    <line x1="6" y1="26" x2="36" y2="26" stroke="#334155" stroke-width="1"/>
  </g>
  <!-- Text -->
  <text x="54" y="26" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a" letter-spacing="0.5">Gulf Trip Service</text>
  <text x="54" y="44" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5" font-weight="500" fill="#64748b" letter-spacing="4" text-transform="uppercase">Premium Saudi Transport</text>
</svg>